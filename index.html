<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SKEYES // QR Position</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
  :root {
    --neon: #00ff41;
    --neon-dim: #00b32d;
    --bg: #0a0a0a;
    --bg2: #101410;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    min-height: 100vh;
    background: var(--bg);
    color: var(--neon);
    font-family: 'Courier New', monospace;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  .terminal {
    width: 100%;
    max-width: 520px;
    background: var(--bg2);
    border: 1px solid var(--neon-dim);
    border-radius: 6px;
    box-shadow: 0 0 25px rgba(0,255,65,0.15), inset 0 0 40px rgba(0,255,65,0.03);
    overflow: hidden;
  }
  .titlebar {
    background: #050505;
    border-bottom: 1px solid var(--neon-dim);
    padding: 8px 14px;
    font-size: 13px;
    letter-spacing: 2px;
    display: flex;
    justify-content: space-between;
  }
  .titlebar .dots span {
    display: inline-block;
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--neon-dim);
    margin-left: 5px;
    opacity: 0.6;
  }
  .content {
    padding: 24px;
  }
  h1 {
    font-size: 18px;
    margin: 0 0 4px 0;
    letter-spacing: 1px;
  }
  h1::before { content: "> "; }
  .sub {
    font-size: 12px;
    color: var(--neon-dim);
    margin-bottom: 20px;
  }
  .box {
    border: 1px dashed var(--neon-dim);
    padding: 14px;
    font-size: 13px;
    line-height: 1.5;
    margin-bottom: 18px;
    background: rgba(0,255,65,0.03);
  }
  button {
    width: 100%;
    background: transparent;
    color: var(--neon);
    border: 1px solid var(--neon);
    padding: 12px;
    font-family: inherit;
    font-size: 14px;
    letter-spacing: 1px;
    cursor: pointer;
    transition: 0.2s;
  }
  button:hover:not(:disabled) {
    background: var(--neon);
    color: #000;
    box-shadow: 0 0 15px rgba(0,255,65,0.5);
  }
  button:disabled {
    opacity: 0.4;
    cursor: not-allowed;
  }
  #status {
    margin-top: 14px;
    font-size: 12px;
    min-height: 18px;
    color: var(--neon-dim);
  }
  #status.error { color: #ff4444; }
  #status.ok { color: var(--neon); }
  #qr-wrap {
    display: none;
    margin-top: 22px;
    text-align: center;
  }
  #qrcode {
    display: inline-block;
    padding: 12px;
    background: #fff;
    border-radius: 4px;
  }
  #coords {
    margin-top: 14px;
    font-size: 11px;
    color: var(--neon-dim);
    word-break: break-all;
  }
  .blink { animation: blink 1.2s step-start infinite; }
  @keyframes blink { 50% { opacity: 0; } }
</style>
</head>
<body>
  <div class="terminal">
    <div class="titlebar">
      <span>skeyes@private-access:~$</span>
      <span class="dots"><span></span><span></span><span></span></span>
    </div>
    <div class="content">
      <h1>GÉNÉRATEUR QR D'ACCÈS</h1>
      <div class="sub">Génération de qr code d'accès privé</div>

      <div class="box">
        Ce site nécessite d'accéder à votre localisation pour vérifier que vous êtes en France.
      </div>

      <button id="btn" onclick="getLocationAndGenerate()">Autoriser &amp; générer le QR code</button>
      <div id="status"><span class="blink">_</span></div>

      <div id="qr-wrap">
        <div id="qrcode"></div>
        <div id="coords"></div>
      </div>
    </div>
  </div>

<script>
  const BASE_LINK = "https://329e.github.io/SKEYES-Download/";
  const statusEl = document.getElementById('status');
  const btn = document.getElementById('btn');
  const qrWrap = document.getElementById('qr-wrap');
  const coordsEl = document.getElementById('coords');
  let qr = null;

  function setStatus(msg, type) {
    statusEl.textContent = msg;
    statusEl.className = type || '';
  }

  // Zone approximative couvrant la France métropolitaine + Corse
  function isInFrance(lat, lon) {
    return lat >= 41.2 && lat <= 51.5 && lon >= -5.3 && lon <= 9.7;
  }

  function getLocationAndGenerate() {
    if (!('geolocation' in navigator)) {
      setStatus('Erreur : la géolocalisation n\'est pas supportée par ce navigateur.', 'error');
      return;
    }

    btn.disabled = true;
    setStatus('Demande d\'autorisation en cours...');

    navigator.geolocation.getCurrentPosition(
      (position) => {
        const lat = position.coords.latitude.toFixed(6);
        const lon = position.coords.longitude.toFixed(6);

        if (!isInFrance(parseFloat(lat), parseFloat(lon))) {
          btn.disabled = false;
          setStatus('Accès refusé : vous devez être en France pour générer ce QR code.', 'error');
          qrWrap.style.display = 'none';
          return;
        }

        const payload = `${BASE_LINK}?lat=${lat}&lon=${lon}`;

        document.getElementById('qrcode').innerHTML = '';
        new QRCode(document.getElementById('qrcode'), {
          text: payload,
          width: 220,
          height: 220,
          colorDark: "#000000",
          colorLight: "#ffffff",
          correctLevel: QRCode.CorrectLevel.M
        });

        coordsEl.textContent = `LAT: ${lat} | LON: ${lon}\nLIEN: ${payload}`;
        qrWrap.style.display = 'block';
        setStatus('QR code généré avec succès.', 'ok');
        btn.disabled = false;
        btn.textContent = 'Régénérer le QR code';
      },
      (error) => {
        btn.disabled = false;
        let msg = 'Erreur inconnue.';
        if (error.code === error.PERMISSION_DENIED) {
          msg = 'Accès à la position refusé. Autorisez la localisation pour générer le QR code.';
        } else if (error.code === error.POSITION_UNAVAILABLE) {
          msg = 'Position indisponible.';
        } else if (error.code === error.TIMEOUT) {
          msg = 'Délai dépassé pour obtenir la position.';
        }
        setStatus(msg, 'error');
      },
      { enableHighAccuracy: true, timeout: 10000, maximumAge: 0 }
    );
  }
</script>
</body>
</html>
